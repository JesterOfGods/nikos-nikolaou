name: Scan assets

# Runs on push when something under assets/ or the scanner itself changes.
# Generates data/asset-manifest.json and commits it back if it changed.
# The commit uses GITHUB_TOKEN, which doesn't trigger downstream workflows —
# no infinite loop.

on:
  push:
    branches: [main]
    paths:
      - 'assets/**'
      - 'scripts/scan-assets.mjs'
      - '.github/workflows/scan-assets.yml'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scan assets
        run: node scripts/scan-assets.mjs

      - name: Commit manifest if changed
        run: |
          git config user.name  "asset-scanner[bot]"
          git config user.email "asset-scanner@users.noreply.github.com"
          git add data/asset-manifest.json
          if git diff --staged --quiet; then
            echo "Manifest unchanged. Nothing to commit."
          else
            git commit -m "chore: auto-update asset manifest [skip ci]"
            git push
          fi
